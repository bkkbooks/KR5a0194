body:
  text: 雷霆猛吏都督辛漢臣著具籙職臣某等謹炷真香䖍誠上奏說經教主元始天尊抱送玉帝靈寶天尊流演聖教降生天尊萬天至尊玉皇上帝光嚴妙樂國王聖父天尊寶月光皇后聖母元君經筵啓問無鞅真聖侍宸拱御一切真仙臣等恭聞玄苑幽居元始升光明之座化身來集玉皇演本行之經言往昔時有妙樂國王號淨德后寶月光慮儲嗣之乏傳勑道流而遍禱已經半載不退初心感太上道君與諸至真駕五色輦抱一嬰兒毛孔放光宫殿攺色從皇后之懇請賜太子以繼承生而神靈長而慈善人歌謡於有道化浹洽以無為既捨國以付大臣遂入山而修至道行藥治病助國救人初乃證於金仙後方成於玉帝昔未曽有嘆莫能窮臣等曠劫受恩纍生蒙化恨以愚迷之性積成深重之愆敢不懴陳以干原赦爰仰遵於教典庸力致於悔思祈斷障以消愆冀禳災而集福隨心滿願證聖成真方兹懴法之宣行首望真仙之臨降庶蒙哀憫遂獲感通伏願世界俱同琉璃仙衆皆乘金碧九色瓊輪之輻輳十絶羽蓋以飛揚靈風奏樂以相和寶花成蓋而遍覆鸞嘯鳳唱龍戲麟盤悉翔舞於天端咸下臨於凡世俾天人而恱慶獲罪咎以蠲除倘副禱祈曷勝至幸臣與弟子某等下情無任瞻望天威拱俟降臨之至誠惶誠恐稽首頓首注想尊容諒沐垂光謹依經念髙虛清明天主所說偈章以伸讃歎金闕玄穹主髙上玉皇尊妙相冠諸天慈光燭三界真聖妙道師天人依仗師大乘垂法語真一指迷途功德若虛空讃揚無窮盡具籙職臣某領録奉大道弟子某等謹䖍誠再拜上奏三清上聖玉帝至尊帝父帝母至聖至真十方三界一切真靈臣等伏聞聖德無窮不容紀讃凡情有感當盡稱揚妙見妙知固無等倫大慈大悲有希哀憫爰按經而稱述庶隨念以皈依一十號强名未可讃難名之號十七光雖盡豈能窮無盡之光大而曰天天亦豈擬其倫極而曰道道則皆從所出雖金口尤莫能盡豈塵世所可得知姑托經言以揚聖德伏願口宣一善在心之衆善皆生聲讃十名滿籍之罪名皆落仁愛和遜隨而增長智慧辨才漸可圓成與諸有情證無上道臣與弟子某等下情無任懇祝之至普與過往祖先見存眷屬塵寰品彚長夜幽魂傾倒䖍誠皈依信禮臣等志心歸命禮玉皇大天尊玄穹髙上帝臣等志心歸命禮舉六通力衆和玉皇大天尊玄穹髙上帝以下每一句衆和天尊聖號各一拜臣等志心歸命禮放大光明白玉京中黃金闕內七寶玄苑大光明殿光明座上聖中最尊清淨第一身寶光𤔵色相妙好幼而敏慧長而慈善仁愛和遜功成超度割愛學道行藥治病拯救衆生廣行方便恢宣正化敷揚神功助國救人行忍辱故放大光明現希有相是穹蒼主浩劫之尊妙見妙知無等無倫湛寂真淨杳亡杳存上聖上靈大神通光明藏大丈夫開化人天教道無窮大慈大悲流煥法輪玄理幽深生浩劫前運化古今號最上乘威德希有無量功德清淨自然神明堅固威靈恢廓名聲周遍無幽不燭神妙巍巍多劫行化具大神通分身變化應現隨方利濟群生普垂教法開悟後人神智妙達莫可度量大神通光大慈悲光大喜捨光大忍辱光大平等光大柔和光大自在光大利益光大如意光大智慧光大吉祥光大解脫光大皈依光大功德光大圓滿光大無礙光無能勝光穹蒼真老妙圓清淨智慧辨才至道至尊三界師混元祖無能聖主四生慈父髙天上聖大慈仁者十號圓滿萬德周身無量度人拔生死苦臣等志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝具籙職臣某領録奉大道弟子某等謹謹䖍誠再拜上奏三清三境天尊昊天玉皇上帝帝父帝母至聖至真三界十方一切真宰臣等伏聞造道成真蓋本過尤之寡從生入死端由踐履之乖性一縱則過積甚於丘山心一悔則罪釋渙如冰雪故本行經教之昭示乃罪福因緣之了明敢不萌於悔心仍復由其縱性投誠懇切望聖矜憐十惡五逆隨跪拜以消除三業六根逐稱揚而洗蕩不敢覆藏而自隱悉皆首露以力陳庶沐慈悲特垂原赦伏願萬目千條之罪言下立消多生歷劫之愆道前咸滅更盡未來之世長為無過之人與道合真去聖不逺上及九玄七祖普同六道三塗蠢蠢群生茫茫下土悉仗玉皇之大德同消曠劫之深愆寡過寡尤盡善盡美臣與弟子某等下情無任懇祝之至普與過往祖先見存眷屬塵寰品彚長夜幽魂傾倒䖍誠皈依信禮臣等志心歸命禮玉皇大天尊玄穹髙上帝臣等志心歸命禮願各各明了罪福因緣玉皇大天尊玄穹髙上帝以下每一句衆和聖號各一拜願是諸惡業悉皆消滅願五逆十惡悉皆消滅願一切惡業悉皆消滅願能滅惡心信向是經願無邊聖教纍承救拔願上聖殊恩得離地獄願塵沙惡業隨心消滅願曠劫巳來罪消滅願縱無明性罪消滅願六塵遍染罪消滅願三業縈纏罪消滅願肆意任心罪消滅願曽無覺悟罪消滅願日積月深罪消滅願背道違真罪消滅願順邪棄正罪消滅願舉心運念罪消滅願不孝父母罪消滅願不敬三寶罪消滅願殺生偷盜罪消滅願邪淫妄語罪消滅願剛强暴惡罪消滅願無恭敬心罪消滅願出誹謗語罪消滅願穢手汚觸罪消滅願葷口讀誦罪消滅願講習俗語罪消滅願共生戲笑罪消滅願地獄中罪消滅願餓鬼中罪消滅願畜生中罪消滅願邊夷外域中罪消滅臣等志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝具籙職臣某領録奉大道弟子某等謹謹䖍誠再拜上奏三清三境天尊昊天玉皇上帝帝父帝母至聖至真三界十方一切真宰臣等伏聞障未斷則蔽塞昏迷礙一除則通達明了隂霾去而日復晴朗浮雲散而天自光輝倘未掃除寧免固蔽心未同於天日障當去於雲霾仰元聖之垂慈宣斷障之妙法俾諸塵之無起庶真境之自明奈何凡夫之愚迷不能按法以修習未免緣情而逐境安能澄慮以凝神容夫外邪亂其至道敗靈根而盜至寶入俗網以墮凡流萬魔來攻一真遂失倘匪沐陶鎔之德豈能成斷障之功按妙典以懴除求諸障而掃蕩爰伸懇告悉丐矜憐伏願錫智慧劒以斷除庶煩惱障而消滅掃開浮翳使慧日之光華拂拭塵勞俾心珠之瑩徹凡身清淨道果圓成普同幽顯之兩途俱識圓明之一性永無流轉長獲逍遙臣與弟子某等下情無任懇祝之至普與過往祖先見存眷屬塵寰品彚長夜幽魂傾倒䖍恭皈依信禮臣等志心歸命禮玉皇大天尊玄穹髙上帝臣等志心歸命禮以下每一句稱和天尊聖號人各一拜願無起疑惑願無起貪嗔願無起淫欲願無起嫉妬願無起殺害願無起凡情願無起凡思願無起昏垢願無起聲色願無起是非願無起憎愛願無起分别願無起髙慢願無起執著願凝神澄慮願萬神調伏願心若太虛願內外貞白願身得清淨願超度諸難願得覩慈顔願咸蒙護度願普聞妙法願親奉供養願永無流轉願惡根斷絶願玄都記名願諸念不生願萬緣頓息願捨除妄想願受持是經願無所不容願無所不納願外邪不亂願真宗不失願靈根不敗願不墮凡流願不入俗網願萬魔不攻願得聞正法願捨除結習願修諸妙行願具解脫門願同清淨信願同清淨解願同清淨念願同清淨行願同清淨身願同清淨心願同清淨意願同清淨果願同清淨報願同大慈心願同大悲心願奉戒專一願冥心大道願善護真宗願孝養父母願恭敬三寶願竭忠於君願不殺不盜願不淫不妬願不嗔不恨願不驕不詐臣等志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝舉玉皇修證在香嚴普放神通十七光為教衆生除斷障法門真一廣宣揚和不可思議功德少息再起具籙職臣某領録奉大道弟子某等謹謹䖍誠再拜奏啓三清三境天尊昊天玉皇上帝帝父帝母至聖至真天地水陽十方印明真宰臣等伏聞無形無名獨髙曰道有體有相寧免乎災天地尤有否終日月亦有薄蝕矧為人類各豢凡軀不能離乎數而超乎緣未免屬於星而隨於運前定之薄夙緣之重次舍以逆時命以乖豈免乎災寧逃乎難大而水火盜賊甚則疾病逃亡六極五衰七傷八難三災四煞九厄十纏鍾於國而國不能安移於歲而歲不能稔兵戈水火饑饉流離既遵奉於教條當懴禳於災厄伏願咸蒙護度悉獲消除回定數而解前緣退威星而平舛運在於一己餘殃以弭而厄㑹以消散及萬殊劫運可逃而洪災可免安處塵寰而動與吉㑹至度道岸而無使災侵己健人安天長地久臣與弟子某等下情無任懇祝之至普與過往祖先見存眷屬塵寰品彚長夜幽魂傾倒䖍誠歸依信禮臣等志心歸命禮玉皇大天尊玄穹髙上帝臣等志心歸命禮以下每一句稱和天尊聖號各一拜願苦惱痊平普蒙解脫願山神衛護猛獸自退願風浪頓止安穩達岸願是諸惡賊悉自退散願𡨚枉自伸即得解脫願衆邪逺避自然安穩願一切災殃不能侵近願一切重病便得痊愈願諸惡鬼神盡自消滅願呪詛蠱毒皆自消滅願至度道岸無使災侵願保命度災掃諸不祥願一切諸魔自然殄滅願消兵戈並起之災願消疫氣大行之災願消水旱蟲蝗之災願消凶年饑饉之災願消種種惡病之災願消疥癩癰疽之災願消憂悲苦惱之災願消橫惡所加之災願消牢獄繫鎖之災願消非命自害之災願消毒藥所殘之災願消𧆞狼蟲蛇之災願消𡨚債牽引之災願消值遇惡人之災願消被他屠割之災願消推落崖岸之災願消邪精殘害之災願消水火漂焚之災願消刀兵誅戮之災願消橫喪天年之災臣等志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝具籙職臣某領録奉大道弟子某等謹謹重伸奏啓三清上聖玉帝至尊帝父帝母至聖至真天地水陽一切真靈臣等伏聞福力崇髙始有福緣之集善念圓熟方期善瑞之臻非天人而莫徵惟仙徒而可繼既未積修真之行而素虧好道之心寧免禱求以干敷錫按妙經之所載謂持誦而後能既巳歸崇粗知習誦罪福兩途罪既除則福必蒙賜災祥二理災既消則祥必可儲既除罪於前定消災於後諒蒙慈憫必徇懇陳敢伸禮拜之恭庶沐簡穰之降露香懇請望帝仁慈伏願德湛厖洪恩施曠蕩祥風廣扇普萬物以咸庥惠澤旁霑俾一門而胥慶五福斂鍚而凡民均樂百祥來介而後裔繁昌世躋仁壽之鄉長享綿延之福如居塵外不異玄中臣與弟子某等下情無任懇祝之至普與過往祖先見存眷屬塵寰品彚長夜幽魂傾倒䖍誠歸依信禮臣等志心歸命禮玉皇大天尊玄穹髙上帝臣等志心歸命禮以下每一句依前和號各一拜願安樂快然神風遐著願貴遇人君職務遷轉願財寶充溢衣食自然願慶流子孫傳之後代願是諸惡星返降吉祥願心欲願者一切如意願衣食自然子孫榮貴願出言希聞所至恭敬願顯貴崇重光大其門願吉祥熾盛災障不侵願道根深重夙有善緣願宿植道本廣種福田願心有所請一切應奉願仙丹妙寶隨意自取臣等志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝具籙職臣某領録奉大道弟子某等謹重誠上奏三清三境天尊金闕玉皇上帝帝父帝母至聖至真天地水陽十方一切列聖恭望洪慈洞回昭鑑臣等伏聞衆寧無願惟所願之不同人各有心豈其心之可一墮者欲升而賤者欲貴貧者欲富而苦者欲安或求證道成真或務濟民利物各有所求豈無願者必待其滿而後釋然仰惟妙道垂慈能遂衆生所願敢伸致禱曲賴昭孚伏願俯察凡情特垂天聽隨機赴感應念從心或利已利他或為幽為顯悉令志滿母使願違臣與弟子某等下情無任懇祝之至普與過往祖先見存眷屬塵寰品彚長夜幽魂傾倒䖍誠歸依信禮臣等志心歸命禮玉皇大天尊玄穹髙上帝臣等志心歸命禮以下每一句依前和號各一拜願天下歌謡欣國太平願地獄衆生化生諸天願三惡道苦一時解脫願普為十方演說諸法願普放神光照燭法界願六凡四聖普叨道䕃願聖賢慶㑹普天興隆願國土清平人民樂業願凶寇自息邊域不爭願運推數周正道當行願一切枯槁復生枝葉願短命衆生各得長壽願六道衆生普蒙開度願一切天人五衰四相永得除滅轉增天福願王臣兆庶即得人天長壽之樂願身或滅度乃得脫殼尸解之道願一切諸魔安處天宫鬪戰之苦各得休息願一切衆生離地獄苦得淨土樂願一切餓鬼即得飽滿無饑渴惱願一切畜生脫畜生苦得智慧樂臣等志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漢大神通玉皇大天尊玄穹髙上帝具籙職臣某領録奉大道弟子某等謹謹重伸上奏三清三境天尊昊天玉皇上帝帝父帝母至聖至真天地水陽衆聖十方一切真靈恭望洪慈洞回淵鑑臣等伏聞求道未勤豈能成道修真有素自可成真諦觀本行之經深貴能持之者凡讀是經可稱真人之號若習其奧必臻仙道之成既再三懇請而斷障消災當究竟證悟而造玄入妙爰伸懴謝以丐周成伏願道氣咸臻天福益固超沉尸而起飛魄逰聖域而聽法音身處五雲神超八極千靈敬仰萬神懾伏三界侍衛五帝司迎不失人身克成真道上資家國下及民生俱入法門同登道岸臣與弟子某等下情無任懇祝之至普與過往祖先見存眷屬塵寰品彚長夜幽魂傾倒䖍誠歸依信禮臣等志心歸命禮玉皇大天尊玄穹髙上帝臣等志心歸命禮以下每一句依前和號各一拜願一切人民咸臻道氣願白首面皺皆得化度紺髮朱顔願少壯幼稚轉得形容光澤美好願枯骨更生沉尸飛魄皆起復形願得生十方諸大天宫願仰朝玉帝各到道前願嬉逰聖域餐聽法音願依教奉行登真成道願一切玉女持幢下迎願獲宿命通遵奉大道願展轉修持至登道岸願神遷淨土蓮華化生願了悟生死深入山林願天魔外道悉皆懾伏願自在逍遙號人中聖願德慧長新同諸真人願坐招自然天福益固願身度三界與道長存願得為九天真仙之人願天真御几玉妃拂筵願萬神班列諸天臨軒願三界侍衛五帝司迎願身處五雲光明赫奕願上升天宫衆真下迎願頓得超證無上妙道願五帝輔翼召使群仙願御役神官運導隂陽願千靈敬仰萬神懾伏願百邪避路群魔束形願逍遙自在與道長存願得證功德身一切有情被其䕃故願得證神通身一切吉祥咸臻集故願得證清淨身是諸惡業不能侵故願得證威德身天魔外道不能攝故願得證無等身上帝遙唱萬神敬故願得證堅固身惡劫大難不能損故願得證道藏身口出語言鬼神仰故願得證慈悲身六道衆生賴其善故願得證大道身出入所在無怖畏故願得證良醫身善行妙法安樂人故願得證光明身常為帝光所攝受故願得證自在身天宫妙境神能遊故臣等志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漢大神通玉皇大天尊玄穹髙上帝具籙職臣某領録奉大道弟子某等謹謹重誠奏啓三清三境天尊昊天玉皇上帝帝父帝母至聖至真天地水陽道德衆聖十方應感一切真靈恭望洪慈洞回淵鑑臣等伏願玉帝功德大能救度於衆生凡俗罪愆深敢歸投於洪造既極稱揚之力復伸懴謝之誠諒沐慈悲特垂赦宥罪福之緣可得明了障礙之因悉皆斷除保命度災延祥集福在心之願得滿修真之道可成豈匪因緣實為慶幸尚賴始終之相佑必令懇禱之昭通無願不從有求皆應保天長存而昌運再啓致國太平而凶寇自夷九幽破壞長夜光明五福斂錫兆民歌唱祖宗升度眷屬壽康財寶充盈而衣食自然子孫榮貴而吉祥熾盛善芽增長道果圓成等與群生普沾聖澤臣與弟子某等下情無任懇祝之至誠惶誠恐稽首頓首再拜謹言大哉至道無宗上真上度諸天下濟幽魂上無師祖惟道為身丹臺紫府金闕玉京祕此妙法溥福含靈滅我萬罪增我遐齡萬神朝禮魔王保迎功德昌盛黃籙書名渺渺億劫使我長存回向向來禮懴功德無量殊勳謹以歸命說經教主元始天尊抱送玉帝靈寶天尊流演聖教降生天尊萬天至尊玉皇上帝光嚴妙樂國王聖父天尊寶月光皇后聖母元君經筵啓問無量真仙天地水陽一切衆聖恭望天慈洞回昭鑑以兹功德專為弟子某等悔過消災延生集慶伏願凡情通感上帝矜憐障業斷除冀功成而滿願吉祥駢集獲增福以消災九祖超升闔門康泰身心清淨處世昌隆一切有情成無上道志心稱念三清應化天尊玉光普照天尊無量不可思議功德玉皇宥罪錫福寶懴終
